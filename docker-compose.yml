version: '3.9'

networks:
  appnet:
    driver: bridge
  monitoring:
    driver: bridge

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: metrics_database
    networks:
      - appnet
    ports:
      - "5432:5432"  # not yet parameterised
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ./Storage/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d telegram_metrics" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    container_name: channel-stats
    networks:
      - appnet
      - monitoring
    ports:
      - 8001:8001
    # File-logging should be removed when going to k8s
    volumes:
      - ./logs:/var/log/app
      - ./secrets:/var/lib/telegram/
    env_file:
      - ./.env-docker  # do we need it here?
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - 80:80
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus:latest
    # user: "1000:1000"
    user: root
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - '--storage.tsdb.retention.time=60d'
      - '--storage.tsdb.wal-compression'
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring

volumes:
  prometheus_data:
  grafana_data:
  logs: